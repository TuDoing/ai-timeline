<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 发展时间轴 — 全球 AI 公司与模型里程碑</title>
  <meta name="description" content="可视化追踪 OpenAI、Google DeepMind、Anthropic、Meta AI 等全球顶级 AI 公司的成立历程与模型发布节点" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
  <div class="spinner"></div>
  <p class="loading-text">正在加载数据…</p>
</div>

<!-- Header -->
<header id="header">
  <button id="sidebar-toggle" title="筛选公司">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <path d="M1 3.5A.5.5 0 0 1 1.5 3h13a.5.5 0 0 1 0 1h-13A.5.5 0 0 1 1 3.5zm2 3A.5.5 0 0 1 3.5 6h9a.5.5 0 0 1 0 1h-9A.5.5 0 0 1 3 6.5zm2 3A.5.5 0 0 1 5.5 9h5a.5.5 0 0 1 0 1h-5A.5.5 0 0 1 5 9.5z"/>
    </svg>
  </button>

  <div class="logo">
    <div class="logo-icon">⚡</div>
    AI Timeline
  </div>

  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="9" cy="9" r="6"/><path d="M14 14l4 4"/>
    </svg>
    <input
      id="search"
      type="search"
      placeholder="搜索事件、公司、人物…"
      autocomplete="off"
      spellcheck="false"
    />
  </div>

  <!-- Type filter chips -->
  <div class="type-filters" id="type-filter-bar"></div>

  <div class="header-stat" id="header-stat"></div>
</header>

<!-- Main Layout -->
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-section-title">公司筛选</div>
    <button class="select-all-btn" id="select-all-btn">全部选中</button>
    <div id="company-list"></div>
  </aside>

  <!-- Timeline -->
  <main id="timeline"></main>

</div>

<!-- Event Detail Modal -->
<div id="modal-overlay">
  <div id="modal"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
